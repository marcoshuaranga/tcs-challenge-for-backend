services:
  floci:
    image: floci/floci:latest
    ports:
      - '4566:4566'
    environment:
      FLOCI_HOSTNAME: floci
      FLOCI_DEFAULT_REGION: us-east-1
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:4566/_localstack/health || exit 1']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  bootstrap:
    image: amazon/aws-cli
    entrypoint: ['/bin/sh', '/bootstrap.sh']
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ./scripts/bootstrap.sh:/bootstrap.sh
    depends_on:
      floci:
        condition: service_healthy

  orders-api:
    build:
      context: .
      dockerfile: apps/orders-api/Dockerfile
    env_file: .env.docker
    ports:
      - '3000:3000'
    depends_on:
      bootstrap:
        condition: service_completed_successfully

  orders-worker:
    build:
      context: .
      dockerfile: apps/orders-worker/Dockerfile
    env_file: .env.docker
    depends_on:
      bootstrap:
        condition: service_completed_successfully

  floci-ui:
    image: floci/floci-ui:latest
    ports:
      - '4500:4500'
    environment:
      FLOCI_ENDPOINT: http://floci:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    depends_on:
      floci:
        condition: service_healthy
